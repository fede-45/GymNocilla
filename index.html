<html>
<head>
    <title>GymNocilla</title>
    <script>
        // Function to migrate old localStorage data
        function migrateOldData() {
            const oldPro = localStorage.getItem('cut_pro');
            const oldScheda = localStorage.getItem('cut_scheda');
            const newData = {};
            if (oldPro) {
                newData.db = JSON.parse(oldPro);
            }
            if (oldScheda) {
                newData.P = JSON.parse(oldScheda);
            }
            localStorage.setItem('cut_data', JSON.stringify(newData));
            localStorage.removeItem('cut_pro');
            localStorage.removeItem('cut_scheda');
        }

        // Check if GEMINI_KEY is set and show modal if not
        function checkGEMINIKey() {
            const geminiKey = localStorage.getItem('cut_gemini_key');
            if (!geminiKey) {
                // Show banner/modal
                alert('Please set your Gemini API Key');
            }
        }

        window.onload = function() {
            migrateOldData();
            checkGEMINIKey();
        };
    </script>
</head>
<body>
    <h1>Welcome to GymNocilla</h1>
    <form>
        <label for="kgInput">Enter weight (kg):</label>
        <input type="number" id="kgInput" min="0">
        <label for="repsInput">Enter reps:</label>
        <input type="number" id="repsInput" min="0">
        <button type="submit">Submit</button>
    </form>
</body>
</html>
